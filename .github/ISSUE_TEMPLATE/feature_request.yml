name: Feature request
description: Suggest something the app should do
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation in the car, not the solution you have in mind.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What you would like it to do
    validations:
      required: true
  - type: checkboxes
    id: constraints
    attributes:
      label: Please confirm
      options:
        - label: This does not require writing anything to the vehicle (the app is read-only towards the car).
          required: true
        - label: I have considered the power cost — this app runs whenever the car is on.
          required: true
