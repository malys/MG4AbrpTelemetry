name: Unstable

# Unstable / pre-release channel. These builds DO self-update: the app checks GitHub
# pre-releases and downloads a newer unstable APK (origin allowlist + signature check).
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and publish unstable APK
    runs-on: ubuntu-latest
    env:
      SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        if: ${{ env.SIGNING_KEYSTORE_BASE64 != '' }}
        run: |
          printf '%s' "$SIGNING_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > "$RUNNER_TEMP/signing.keystore"
          if [ "$(head -c1 "$RUNNER_TEMP/signing.keystore" | od -An -tx1 | tr -d ' ')" != "30" ]; then
            echo "::error::SIGNING_KEYSTORE_BASE64 is invalid. Recreate it with: base64 -w0 signing.keystore"
            exit 1
          fi
          echo "SIGNING_KEYSTORE=$RUNNER_TEMP/signing.keystore" >> "$GITHUB_ENV"

      - name: Run checks
        run: |
          chmod +x gradlew
          bash .github/security/check-permissions.sh
          ./gradlew testUnstableDebugUnitTest lintUnstableDebug --no-daemon

      - name: Resolve unstable version
        id: version
        run: |
          chmod +x gradlew
          v=$(./gradlew -q printUnstableVersion -PunstableBuild=${{ github.run_number }} --no-daemon | tail -1)
          echo "value=$v" >> "$GITHUB_OUTPUT"

      - name: Build unstable release APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleUnstableRelease -PunstableBuild=${{ github.run_number }} --no-daemon

      - name: Collect APK
        run: |
          mkdir -p dist
          find app/build/outputs/apk -name "MG4AbrpTelemetry-unstable.apk" -exec cp {} dist/ \;
          ls -la dist/

      - name: Publish pre-release
        uses: softprops/action-gh-release@v2
        with:
          # The in-app updater compares this tag against the installed version, so it
          # must stay parseable as a version.
          tag_name: v${{ steps.version.outputs.value }}
          name: Unstable ${{ steps.version.outputs.value }}
          prerelease: true
          files: dist/*.apk
          body: |
            ## Unstable build ${{ github.run_number }}

            Automated build from `master`. **Not tested on a vehicle.**

            Installed unstable builds update themselves from this channel. The updater accepts
            an APK only over https from a GitHub host, and only if it is signed with the
            same certificate as the running app — otherwise it deletes the file.

            Commit: ${{ github.sha }}
